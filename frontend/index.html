<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SalonBook</title>

    <!--
      Google Translate: restricted to English + 10 Indian languages.
      The browser toolbar banner is fully suppressed via CSS.
      Translation is driven by the app's own language selector through
      the doGTranslate() helper written below.
    -->
    <style>
      /* ── Google Translate chrome suppression ─────────────────────────── */

      /* 1. Banner / toolbar — fully hidden */
      .goog-te-banner-frame,
      #goog-te-banner-frame,
      .goog-te-balloon-frame,
      iframe.skiptranslate,
      .VIpgJd-ZVi9od-aZ2wEe-wOHMyf,
      .VIpgJd-ZVi9od-ORHb-OEVmcd,
      #goog-gt-tt,
      .goog-tooltip,
      .goog-tooltip:hover { display: none !important; }

      /* 2. The widget gadget: visually hidden but NOT display:none so the
            <select> stays in the DOM and dispatchEvent works correctly */
      .goog-te-gadget {
        position: fixed !important;
        top: -9999px !important;
        left: -9999px !important;
        opacity: 0 !important;
        pointer-events: none !important;
        width: 1px !important;
        height: 1px !important;
        overflow: hidden !important;
      }

      /* 3. Mount point — also off-screen */
      #google_translate_element {
        position: fixed !important;
        top: -9999px !important;
        left: -9999px !important;
        width: 1px !important;
        height: 1px !important;
        overflow: hidden !important;
      }

      /* 4. Prevent Google Translate from pushing body down */
      body { top: 0 !important; }
      html body { margin-top: 0 !important; }
    </style>
  </head>
  <body>
    <!-- Hidden mount point — never rendered -->
    <div id="google_translate_element" aria-hidden="true"></div>

    <script>
      /* ── Google Translate init ───────────────────────────────────────── */
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: 'en',
            includedLanguages: 'en,hi',
            autoDisplay: false,
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE
          },
          'google_translate_element'
        );
      }

      /**
       * doGTranslate(lang)
       * Called from React Header to switch page language via Google Translate.
       *
       * Strategy:
       * - Find the hidden .goog-te-combo <select> (Google Translate widget)
       * - Set its value and fire both 'input' and 'change' events
       * - For English: clear cookies + reload (most reliable reset)
       * - Polls up to 30 × 300 ms while the widget initialises
       */
      window.doGTranslate = function(lang) {
        var d = location.hostname;
        var exp = 'expires=Thu, 01 Jan 1970 00:00:00 UTC';
        
        // Always clear first
        document.cookie = 'googtrans=; ' + exp + '; path=/;';
        document.cookie = 'googtrans=; ' + exp + '; path=/; domain=' + d;
        document.cookie = 'googtrans=; ' + exp + '; path=/; domain=.' + d;
        
        if (lang !== 'en') {
          // Set cookie for translation
          document.cookie = 'googtrans=/en/' + lang + '; path=/;';
          if (d !== 'localhost') {
            document.cookie = 'googtrans=/en/' + lang + '; path=/; domain=' + d;
            document.cookie = 'googtrans=/en/' + lang + '; path=/; domain=.' + d;
          }
        }
        
        location.reload();
      };
    </script>

    <!-- Google Translate script — async so it never blocks first paint -->
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
